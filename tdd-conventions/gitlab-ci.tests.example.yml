# Фрагмент для .gitlab-ci.yml (корень сервиса = каталог с pyproject.toml).
# Скопируйте job'ы и при необходимости задайте SERVICE_DIR.

stages:
  - test

variables:
  PYTHON_IMAGE: "python:3.12-slim"
  POETRY_VERSION: "1.8.3"
  # Путь к сервису от корня репозитория; "." если pyproject.toml в корне репо
  SERVICE_DIR: "."

.poetry_install: &poetry_install
  - pip install "poetry==${POETRY_VERSION}"
  - cd "${CI_PROJECT_DIR}/${SERVICE_DIR}"
  - poetry config virtualenvs.create false
  - poetry install --no-interaction --no-ansi

unit-tests:
  stage: test
  image: ${PYTHON_IMAGE}
  before_script: *poetry_install
  script:
    - >
      poetry run pytest
      --cov=src
      --cov-report=term-missing
      --cov-report=xml:coverage.xml
      --junitxml=report.xml
  coverage: '/^TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    paths:
      - "${SERVICE_DIR}/coverage.xml"
      - "${SERVICE_DIR}/report.xml"
    reports:
      junit: "${SERVICE_DIR}/report.xml"
      coverage_report:
        coverage_format: cobertura
        path: "${SERVICE_DIR}/coverage.xml"

# Опционально: порог покрытия (раскомментируйте --cov-fail-under в script)
# unit-tests:
#   script:
#     - poetry run pytest --cov=src --cov-fail-under=70 ...
